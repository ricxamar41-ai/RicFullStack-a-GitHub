<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RicFullStack — Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>RicFullStack — Dashboard</h1></header>
<main>
<section id="summary">
<h2>Resumen</h2>
<div id="totals">Cargando...</div>
</section>
<section id="donations">
<h2>Donaciones</h2>
<form id="donationForm">
<input id="donor" placeholder="Nombre donante" required />
<input id="amount" placeholder="Cantidad" type="number" step="0.01" required />
<button type="submit">Enviar donación</button>
</form>
<ul id="donationList"></ul>
</section>
</main>
<script src="app.js"></script>
</body>
</html>
